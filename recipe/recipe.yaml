schema_version: 1

context:
  version: "1.0.10"

package:
  name: pyroscope-io
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pyroscope-io/pyroscope_io-${{ version }}.tar.gz
  sha256: 83152ccc2be588fca26de0a57ca72eb5415bdd0fdf77517f396d5c38bcea8702

build:
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    - pushd rust && cargo-bundle-licenses --format yaml --output ../THIRDPARTY.yml && popd
  skip:
    - win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - pkg-config
  host:
    - python
    - setuptools >=82.0.0,<83.0.0
    - setuptools-rust >=1.12.0,<2.0.0
    - cffi >=2.0.0,<3.0.0
    - pip
    - openssl
  run:
    - python
    - cffi >=2.0.0,<3.0.0

tests:
  - python:
      imports:
        - pyroscope
        - pyroscope_io
      pip_check: true

about:
  summary: Pyroscope Python integration
  license: Apache-2.0
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  homepage: https://pypi.org/project/pyroscope-io/

extra:
  recipe-maintainers:
    - AndreasAlbertQC
